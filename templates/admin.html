<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 · 用户管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="admin">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="side-logo">
        <div class="brand-mark">U</div>
        <span>USERVAULT</span>
      </div>
      <nav class="side-nav">
        <a class="side-item active" href="#">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          用户管理
        </a>
      </nav>
      <div class="side-foot">
        <div class="side-user">
          <div class="avatar" id="sideAvatar">A</div>
          <div class="meta">
            <div class="name" id="sideName">管理员</div>
            <div class="role">admin</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main">
      <div class="topbar">
        <div>
          <div class="crumb">控制台 / <b>用户管理</b></div>
          <h1>用户管理</h1>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost btn-sm" id="refreshBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            刷新
          </button>
          <button class="btn btn-primary btn-sm" id="addBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
            新增用户
          </button>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">登出</button>
        </div>
      </div>

      <!-- 统计 -->
      <section class="stat-grid">
        <div class="card stat-card">
          <div class="stat-top">
            <div class="stat-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg></div>
          </div>
          <div><div class="stat-val" id="stTotal">0</div><div class="stat-lbl">用户总数</div></div>
        </div>
        <div class="card stat-card">
          <div class="stat-top">
            <div class="stat-ic green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          </div>
          <div><div class="stat-val" id="stActive">0</div><div class="stat-lbl">启用中</div></div>
        </div>
        <div class="card stat-card">
          <div class="stat-top">
            <div class="stat-ic red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
          </div>
          <div><div class="stat-val" id="stDisabled">0</div><div class="stat-lbl">已禁用</div></div>
        </div>
        <div class="card stat-card">
          <div class="stat-top">
            <div class="stat-ic blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          </div>
          <div><div class="stat-val" id="stAdmins">0</div><div class="stat-lbl">管理员</div></div>
        </div>
      </section>

      <!-- 表格 -->
      <section class="card table-card">
        <div class="toolbar">
          <div class="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" id="keyword" type="text" placeholder="搜索用户名或邮箱..." />
          </div>
          <select class="input select" id="roleFilter" style="width:auto">
            <option value="">全部角色</option>
            <option value="admin">管理员</option>
            <option value="user">普通用户</option>
          </select>
          <select class="input select" id="statusFilter" style="width:auto">
            <option value="">全部状态</option>
            <option value="1">启用</option>
            <option value="0">禁用</option>
          </select>
        </div>

        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>用户</th>
                <th>角色</th>
                <th>状态</th>
                <th>注册时间</th>
                <th style="text-align:right">操作</th>
              </tr>
            </thead>
            <tbody id="userTbody"></tbody>
          </table>
        </div>

        <div class="pager">
          <div class="pager-info" id="pagerInfo">0 条</div>
          <div class="pager-btns">
            <button class="btn-icon" id="prevBtn" title="上一页"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg></button>
            <button class="btn-icon" id="nextBtn" title="下一页"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <h3 id="modalTitle">新增用户</h3>
      <p class="msub" id="modalSub">填写以下信息创建用户</p>
      <form id="userForm">
        <input type="hidden" name="id" />
        <div class="modal-grid">
          <div class="field">
            <label>用户名</label>
            <input class="input" name="username" placeholder="3-20 位" />
            <div class="field-hint"></div>
          </div>
          <div class="field">
            <label>邮箱</label>
            <input class="input" name="email" placeholder="you@example.com" />
            <div class="field-hint"></div>
          </div>
          <div class="field full" id="pwdField">
            <label>密码</label>
            <input class="input" name="password" type="password" placeholder="新增必填，编辑留空则不修改" />
            <div class="field-hint"></div>
          </div>
          <div class="field">
            <label>角色</label>
            <div class="seg">
              <label><input type="radio" name="role" value="user" checked /><span>普通用户</span></label>
              <label><input type="radio" name="role" value="admin" /><span>管理员</span></label>
            </div>
          </div>
          <div class="field">
            <label>状态</label>
            <div class="seg">
              <label><input type="radio" name="status" value="1" checked /><span>启用</span></label>
              <label><input type="radio" name="status" value="0" /><span>禁用</span></label>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" id="cancelBtn">取消</button>
          <button class="btn btn-primary" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
